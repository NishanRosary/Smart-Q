name: SmartQ CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Create .env for CI
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> backend/.env
          echo "PORT=5000" >> backend/.env
          echo "JWT_ACCESS_SECRET=testsecret" >> backend/.env
          echo "JWT_REFRESH_SECRET=testsecret" >> backend/.env
          echo "ACCESS_TOKEN_EXPIRE=15m" >> backend/.env
          echo "REFRESH_TOKEN_EXPIRE=7d" >> backend/.env
          echo "REFRESH_TOKEN_DAYS=7" >> backend/.env

      - name: Install ML dependencies
        run: |
          cd backend/ml
          pip install -r requirements.txt

      - name: Start ML service
        run: |
          cd backend/ml
          nohup python app.py > ml.log 2>&1 &
          sleep 5

      - name: Verify ML service is running
        run: |
          curl --retry 10 --retry-delay 3 http://localhost:5001/health

      - name: Run backend tests
        run: |
          cd backend
          npm test

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build