name: SmartQ CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Install ML dependencies
        run: |
          cd backend/ml
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create CI env file
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> backend/.env
          echo "PORT=5000" >> backend/.env
          echo "JWT_ACCESS_SECRET=testsecret" >> backend/.env
          echo "JWT_REFRESH_SECRET=testsecret" >> backend/.env
          echo "ACCESS_TOKEN_EXPIRE=15m" >> backend/.env
          echo "REFRESH_TOKEN_EXPIRE=7d" >> backend/.env
          echo "REFRESH_TOKEN_DAYS=7" >> backend/.env
          echo "ML_HEALTH_URL=http://127.0.0.1:5001/health" >> backend/.env

      - name: Run ML service and tests
        run: |
          cd backend

          echo "Starting ML service..."
          python ml/ml_service.py 5001 > ml.log 2>&1 &
          
          echo "Waiting for ML service..."
          for i in {1..40}; do
            if curl -s http://127.0.0.1:5001/health > /dev/null; then
              echo "ML service ready"
              break
            fi
            sleep 2
          done

          echo "Running backend tests..."
          npm test

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build